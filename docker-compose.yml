services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${PORT:-8020}:${PORT:-8020}"
    environment:
      - PORT=${PORT:-8020}
      - AGENT_HOST=agent
      - AGENT_PORT=${AGENT_PORT:-8021}
      - STORAGE_PATH=/app/storage
      - MISSAQUEST_URL=${MISSAQUEST_URL}
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    depends_on:
      - agent
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "${AGENT_PORT:-8021}:${AGENT_PORT:-8021}"
    environment:
      - AGENT_PORT=${AGENT_PORT:-8021}
      - STORAGE_PATH=/app/storage
      - HEADLESS=${HEADLESS:-1}
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./storage/screenshots:/app/screenshots
    restart: unless-stopped
