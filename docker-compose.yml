services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${API_HOST_PORT:-8010}:${PORT:-8000}"
    environment:
      - PORT=${PORT:-8000}
      - AGENT_HOST=agent
      - AGENT_PORT=${AGENT_PORT:-8001}
      - STORAGE_PATH=/app/storage
      - PG_HOST=${PG_HOST}
      - PG_PORT=${PG_PORT:-5432}
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_DATABASE=${PG_DATABASE}
      - MISSAQUEST_URL=${MISSAQUEST_URL:-http://localhost:8010}
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    depends_on:
      - agent
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "${AGENT_HOST_PORT:-8011}:${AGENT_PORT:-8001}"
    environment:
      - PORT=${AGENT_PORT:-8001}
      - STORAGE_PATH=/app/storage
      - HEADLESS=${HEADLESS:-1}
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./storage/screenshots:/app/screenshots
    restart: unless-stopped
