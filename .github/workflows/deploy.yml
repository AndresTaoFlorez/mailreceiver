name: Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            REPO_DIR=/home/sample/tybacase_mailwindow
            if [ ! -d "$REPO_DIR" ]; then
              git clone git@github.com:${{ github.repository }}.git "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git pull origin main
            docker compose up -d --build
